version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: olx_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: olx_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CHROMA_PATH: /app/chroma_data
    volumes:
      - ./scraper/chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy

  scraper:
    build: ./scraper
    container_name: olx_scraper
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CHROMA_PATH: /app/chroma_data
    volumes:
      - ./scraper:/app
      - ./scraper/chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python cleaner.py && python ../backend/loader.py"

  frontend:
    build: ./frontend
    container_name: olx_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: